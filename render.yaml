services:
  - type: web
    name: nicosia-chaos-league
    env: node
    plan: free
    buildCommand: npm install --include=dev --no-audit --no-fund && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: CLIENT_ORIGIN
        value: "*"
