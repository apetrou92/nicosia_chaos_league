[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["corepack enable && corepack prepare pnpm@9.15.4 --activate && pnpm install --prod --no-frozen-lockfile"]

[phases.build]
cmds = ["echo \"Client is prebuilt in client/dist; skipping Vite build\""]

[start]
cmd = "node server/src/index.js"
